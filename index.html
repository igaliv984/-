<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog System</title>
</head>
<body>
    <h1>Catalog System</h1>
    <div id="catalog">
        <h2>Demo Catalog</h2>
        <div id="items">
            <div class="item">
                <h3>Item 1</h3>
                <p>Description of item 1 with demo data.</p>
                <p>Price: $10.00</p>
            </div>
            <div class="item">
                <h3>Item 2</h3>
                <p>Description of item 2 with demo data.</p>
                <p>Price: $20.00</p>
            </div>
        </div>
    </div>
    <div id="filters">
        <h2>Filter</h2>
        <input type="text" placeholder="Search..." id="search"/>
        <button onclick="filterItems()">Filter</button>
    </div>
    <div id="calculator">
        <h2>Calculator</h2>
        <input type="number" id="value1" placeholder="Value 1"/>
        <input type="number" id="value2" placeholder="Value 2"/>
        <button onclick="calculate()">Calculate</button>
        <p>Result: <span id="result"></span></p>
    </div>
    <div id="formSubmission">
        <h2>Form Submission</h2>
        <form id="submissionForm">
            <input type="text" placeholder="Your Name" required/>
            <input type="email" placeholder="Your Email" required/>
            <button type="submit">Submit</button>
        </form>
    </div>
    <script>
        function filterItems() {
            const query = document.getElementById('search').value.toLowerCase();
            const items = document.querySelectorAll('.item');
            items.forEach(item => {
                if (item.textContent.toLowerCase().includes(query)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        }
        function calculate() {
            const value1 = parseFloat(document.getElementById('value1').value);
            const value2 = parseFloat(document.getElementById('value2').value);
            const result = value1 + value2; // For simplicity, just adding
            document.getElementById('result').textContent = result;
        }
        document.getElementById('submissionForm').onsubmit = function(event) {
            event.preventDefault();
            alert('Form submitted!');
        };
    </script>
</body>
</html>
